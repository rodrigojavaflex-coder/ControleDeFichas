name: Deploy Render

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy-render:
    name: Disparar deploy Render
    runs-on: ubuntu-latest
    steps:
      - name: Disparar deploy no Render (opcional)
        continue-on-error: true
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL não configurado."
            echo "Configure o secret no GitHub OU ative Auto-Deploy no Render (Settings → Build & Deploy)."
            exit 1
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Deploy solicitado no Render."
